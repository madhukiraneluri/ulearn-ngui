<div class="auth-page login-page">
  <div class="auth-card login-card">
    <div class="brand-header">
      <img src="assets/images/logo.jpeg" alt="ULearn" class="brand-logo-full" />
    </div>

    <div class="card-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your ULearn account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form login-form">
      <div class="form-group anim-item" style="--delay: 0.15s">
        <label for="email" class="form-label">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-input"
          placeholder="your.email@college.com"
          autocomplete="email"
          [class.error]="isFieldInvalid('email')"
        />
        @if (isFieldInvalid('email')) {
          <span class="error-message">{{ getErrorMessage('email') }}</span>
        }
      </div>

      <div class="form-group anim-item" style="--delay: 0.25s">
        <div class="password-header">
          <label for="password" class="form-label">Password</label>
          <a href="#" class="forgot-link" (click)="$event.preventDefault()">Forgot password?</a>
        </div>
        <div class="password-field">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            [class.error]="isFieldInvalid('password')"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            tabindex="-1"
          >
            @if (showPassword) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            }
          </button>
        </div>
        @if (isFieldInvalid('password')) {
          <span class="error-message">{{ getErrorMessage('password') }}</span>
        }
      </div>

      <button
        type="submit"
        class="btn-submit anim-item"
        style="--delay: 0.35s"
        [disabled]="form.invalid || isLoading()"
      >
        @if (isLoading()) {
          <span class="loader"></span>
          Signing in...
        } @else {
          Continue Learning
        }
      </button>
    </form>

    <div class="card-footer anim-item" style="--delay: 0.45s">
      <p>Don't have an account? <a routerLink="/auth/signup" class="link">Create one</a></p>
    </div>
  </div>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>
