<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="assets/images/logo.jpeg" alt="ULearn" />
    </div>

    <div class="auth-header">
      <h1>Create your account</h1>
      <p>Join 1,00,000+ students already learning on ULearn</p>
    </div>

    <div class="auth-form">

      <div class="form-group">
        <label>Full name <span class="required">*</span></label>
        <input
          type="text"
          placeholder="Your full name"
          [value]="form().name"
          (input)="update('name', $any($event.target).value)"
          [disabled]="isLoading()"
        />
      </div>

      <div class="form-group">
        <label>Email address <span class="required">*</span></label>
        <input
          type="email"
          placeholder="you@example.com"
          [value]="form().email"
          (input)="update('email', $any($event.target).value)"
          [disabled]="isLoading()"
        />
      </div>

      <div class="form-group">
        <label>Phone number <span class="optional">(optional)</span></label>
        <input
          type="tel"
          placeholder="+91 98765 43210"
          [value]="form().phone ?? ''"
          (input)="update('phone', $any($event.target).value)"
          [disabled]="isLoading()"
        />
      </div>

      <div class="form-group">
        <label>Password <span class="required">*</span></label>
        <div class="input-wrap">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="Min 8 characters"
            [value]="form().password"
            (input)="update('password', $any($event.target).value)"
            [disabled]="isLoading()"
          />
          <button class="toggle-pw" type="button" (click)="togglePassword()">
            @if (showPassword()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm password <span class="required">*</span></label>
        <input
          [type]="showPassword() ? 'text' : 'password'"
          placeholder="Repeat your password"
          [value]="form().confirmPassword"
          (input)="update('confirmPassword', $any($event.target).value)"
          [disabled]="isLoading()"
          (keydown.enter)="submit()"
        />
      </div>

      <button
        class="btn-primary submit-btn"
        (click)="submit()"
        [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span> Creating account...
        } @else {
          Create Account
        }
      </button>

    </div>

    <div class="auth-footer">
      Already have an account?
      <a routerLink="/auth/login">Sign in</a>
    </div>

  </div>
</div>
